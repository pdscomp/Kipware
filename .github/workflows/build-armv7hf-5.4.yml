name: Build armv7hf-5.4

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: armv7hf-5.4-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pdscomp/kipware-runner:latest
      options: --user 0

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure host build headers
        run: |
          missing_tools=0
          for tool in gcc g++ make; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              missing_tools=1
            fi
          done

          if [[ ! -f /usr/include/stdc-predef.h || "${missing_tools}" -eq 1 ]]; then
            apt-get update
            apt-get install -y --no-install-recommends build-essential libc6-dev linux-libc-dev
          fi

          test -f /usr/include/stdc-predef.h

      - name: Restore download cache
        id: restore-download-cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: ${{ runner.os }}-armv7hf-5.4-dl-${{ hashFiles('feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-dl-

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-armv7hf-5.4-ccache-${{ hashFiles('configs/armv7hf-5.4.config', 'bake_armv7hf.sh', 'feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-ccache-

      - name: Restore feed checkout cache
        id: restore-feeds-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            feeds
            package/feeds
          key: ${{ runner.os }}-armv7hf-5.4-feeds-${{ hashFiles('feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-feeds-

      - name: Restore host and toolchain cache
        id: restore-host-toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build_dir/host
            build_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
            staging_dir/host
            staging_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
          key: ${{ runner.os }}-armv7hf-5.4-host-toolchain-v1-${{ hashFiles('configs/armv7hf-5.4.config', 'bake_armv7hf.sh', 'feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-host-toolchain-v1-

      - name: Prepare appuser workspace
        run: |
          id appuser
          chown -R appuser:appuser "${GITHUB_WORKSPACE}"
          install -d -o appuser -g appuser /home/appuser/.cache

      - name: Bake full armv7hf-5.4 build
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" \
            bash -euo pipefail -lc '
              cd "${GITHUB_WORKSPACE}"
              mkdir -p dl .ccache
              ccache --zero-stats || true
              ./bake_armv7hf.sh world
              ccache --show-stats || true
            '

      - name: Save download cache
        if: always() && steps.restore-download-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dl
          key: ${{ steps.restore-download-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: always() && steps.restore-ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}

      - name: Save feed checkout cache
        if: always() && steps.restore-feeds-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            feeds
            package/feeds
          key: ${{ steps.restore-feeds-cache.outputs.cache-primary-key }}

      - name: Save host and toolchain cache
        if: always() && steps.restore-host-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build_dir/host
            build_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
            staging_dir/host
            staging_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
          key: ${{ steps.restore-host-toolchain-cache.outputs.cache-primary-key }}

      - name: Verify hard-float toolchain
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -lc '
            cd "${GITHUB_WORKSPACE}"
            TOOLCHAIN_BIN="$(find staging_dir -path '\''*/bin/arm-openwrt-linux-gnueabihf-gcc'\'' | head -n 1)"
            test -n "${TOOLCHAIN_BIN}"
            printf '\''int main(void) { return 0; }\n'\'' > /tmp/abi.c
            "${TOOLCHAIN_BIN}" -o /tmp/abi /tmp/abi.c
            file /tmp/abi
            readelf -A /tmp/abi | grep '\''Tag_ABI_VFP_args: VFP registers'\''
          '

      - name: Verify published package set
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -euo pipefail -lc '
            cd "${GITHUB_WORKSPACE}"
            search_roots=(bin/targets/armv7-5.4)
            if [ -d bin/packages/armv7-5.4 ]; then
              search_roots+=(bin/packages/armv7-5.4)
            fi

            echo "Resolved Python selections:"
            grep -E "^CONFIG_PACKAGE_(libpython3|python3|python3-(async-timeout|cffi|dbus-fast|distro|greenlet|ifaddr|jinja2|markupsafe|numpy|paho-mqtt|pillow|pip|ply|pycparser|pyserial|tornado|zeroconf))=" .config || true

            echo
            echo "Target package directories:"
            find bin/targets -type d -path "*/packages" | sort || true

            echo
            echo "Python-related IPKs under bin/:"
            find "${search_roots[@]}" -type f \( -name '\''python3_*.ipk'\'' -o -name '\''libpython3_*.ipk'\'' -o -name '\''python3-*.ipk'\'' \) | sort || true

            echo
            echo "Entware bootstrap IPKs under bin/:"
            find "${search_roots[@]}" -type f \( -name '\''entware-release_*.ipk'\'' -o -name '\''entware-upgrade_*.ipk'\'' \) | sort || true

            required_python_pkgs=(
              python3
              libpython3
              python3-cffi
              python3-dbus-fast
              python3-distro
              python3-greenlet
              python3-jinja2
              python3-markupsafe
              python3-numpy
              python3-paho-mqtt
              python3-pillow
              python3-pip
              python3-pyserial
              python3-tornado
              python3-zeroconf
            )

            python3_pkg="$(find "${search_roots[@]}" -type f -name '\''python3_*.ipk'\'' -print -quit)"
            libpython3_pkg="$(find "${search_roots[@]}" -type f -name '\''libpython3_*.ipk'\'' -print -quit)"
            entware_release_pkg="$(find "${search_roots[@]}" -type f -name '\''entware-release_*.ipk'\'' -print -quit)"
            entware_upgrade_pkg="$(find "${search_roots[@]}" -type f -name '\''entware-upgrade_*.ipk'\'' -print -quit)"

            printf "python3: %s\n" "${python3_pkg:-missing}"
            printf "libpython3: %s\n" "${libpython3_pkg:-missing}"
            printf "entware-release: %s\n" "${entware_release_pkg:-missing}"
            printf "entware-upgrade: %s\n" "${entware_upgrade_pkg:-missing}"

            for pkg in "${required_python_pkgs[@]}"; do
              pkg_ipk="$(find "${search_roots[@]}" -type f -name "${pkg}_*.ipk" -print -quit)"
              printf "%s: %s\n" "${pkg}" "${pkg_ipk:-missing}"
              test -n "${pkg_ipk}"
            done

            test -n "${python3_pkg}"
            test -n "${libpython3_pkg}"
            test -n "${entware_release_pkg}"
            test -n "${entware_upgrade_pkg}"
          '

      - name: Stage GitHub Pages feed
        env:
          PUBLISH_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/armv7hf-k5.4
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            PUBLISH_BASE_URL="${PUBLISH_BASE_URL}" \
            bash -lc '
              cd "${GITHUB_WORKSPACE}"
              ./scripts/stage-armv7hf-pages.sh pages "${PUBLISH_BASE_URL}"
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armv7hf-5.4-artifacts
          path: |
            bin/**/*.ipk
            pages/**/*
            logs/**/*
            .config

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
