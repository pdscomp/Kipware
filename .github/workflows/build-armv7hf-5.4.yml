name: Build armv7hf-5.4

on:
  push:
    branches:
      - main
      - kip
  pull_request:
    branches:
      - main
      - kip
  workflow_dispatch:
  # schedule:
  #   - cron: '0 4 * * 0'

permissions:
  contents: write

concurrency:
  group: armv7hf-5.4-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pdscomp/kipware-runner:latest
      options: --user 0

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure host build headers
        run: |
          missing_tools=0
          for tool in gcc g++ make; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              missing_tools=1
            fi
          done

          if [[ ! -f /usr/include/stdc-predef.h || "${missing_tools}" -eq 1 ]]; then
            apt-get update
            apt-get install -y --no-install-recommends build-essential libc6-dev linux-libc-dev
          fi

          test -f /usr/include/stdc-predef.h

      - name: Resolve feed lock
        id: feed-lock
        run: |
          python3 scripts/ci/feed_lock.py \
            --feeds-conf feeds.conf \
            --output .ci/feed-lock.json

      - name: Compute build fingerprint
        id: fingerprint
        run: |
          target_ref="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          python3 scripts/ci/build_fingerprint.py \
            --branch "${target_ref}" \
            --feed-lock .ci/feed-lock.json \
            --output .ci/build-fingerprint.json

      - name: Compare previous published manifest
        id: preflight
        run: |
          target_ref="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          manifest_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/${target_ref}/armv7hf-k5.4/build-manifest.json"
          echo "Previous manifest URL: ${manifest_url}"
          python3 scripts/ci/compare_manifest.py \
            --current .ci/build-fingerprint.json \
            --previous-url "${manifest_url}" \
            --output .ci/build-decision.json

      - name: Build decision summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          fp = json.loads(Path('.ci/build-fingerprint.json').read_text())
          decision = json.loads(Path('.ci/build-decision.json').read_text())
          print(f"build_fingerprint={fp['build_fingerprint']}")
          print(f"needs_build={decision['needs_build']}")
          print(f"force_world_rebuild={decision['force_world_rebuild']}")
          print(f"reason={decision['reason']}")
          print(f"changed_components={','.join(decision.get('changed_components', []))}")
          PY

      - name: Verify existing published feed for no-op build
        if: steps.preflight.outputs.needs_build == 'false'
        run: |
          target_ref="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          packages_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/${target_ref}/armv7hf-k5.4/Packages.gz"
          curl -fsS "${packages_url}" >/dev/null
          echo "No build needed; existing feed is available at ${packages_url}"

      - name: Restore download cache
        if: steps.preflight.outputs.needs_build == 'true'
        id: restore-download-cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: ${{ runner.os }}-armv7hf-5.4-dl-v2-${{ steps.feed-lock.outputs.feed_lock_sha }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-dl-v2-
            ${{ runner.os }}-armv7hf-5.4-dl-

      - name: Restore ccache
        if: steps.preflight.outputs.needs_build == 'true'
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-armv7hf-5.4-ccache-v2-${{ steps.fingerprint.outputs.toolchain_cache_sha }}-${{ steps.fingerprint.outputs.package_input_sha }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-ccache-v2-${{ steps.fingerprint.outputs.toolchain_cache_sha }}-
            ${{ runner.os }}-armv7hf-5.4-ccache-v2-
            ${{ runner.os }}-armv7hf-5.4-ccache-

      - name: Restore feed checkout cache
        if: steps.preflight.outputs.needs_build == 'true'
        id: restore-feeds-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            feeds
          key: ${{ runner.os }}-armv7hf-5.4-feeds-v2-${{ steps.feed-lock.outputs.feed_lock_sha }}-${{ hashFiles('local-patches/**/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-feeds-v2-${{ steps.feed-lock.outputs.feed_lock_sha }}-
            ${{ runner.os }}-armv7hf-5.4-feeds-v2-
            ${{ runner.os }}-armv7hf-5.4-feeds-

      - name: Restore host and toolchain cache
        if: steps.preflight.outputs.needs_build == 'true'
        id: restore-host-toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build_dir/host
            # Toolchain path encodes CPU, gcc, and glibc versions from configs/armv7hf-5.4.config:
            #   CONFIG_CPU_TYPE="cortex-a7+neon-vfpv4"  (→ arm_cortex-a7+neon-vfpv4)
            #   Entware toolchain pins gcc-8.4.0 and glibc-2.27 for armv7-5.4
            # Update these two lines if the toolchain is ever bumped.
            build_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
            staging_dir/host
            staging_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
          key: ${{ runner.os }}-armv7hf-5.4-host-toolchain-v3-${{ steps.fingerprint.outputs.toolchain_cache_sha }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-host-toolchain-v3-
            ${{ runner.os }}-armv7hf-5.4-host-toolchain-v2-
            ${{ runner.os }}-armv7hf-5.4-host-toolchain-v1-

      - name: Restore rustc-dev host cache
        if: steps.preflight.outputs.needs_build == 'true'
        id: restore-rustc-dev-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            # rustc-dev uses a non-standard install prefix: $(STAGING_DIR)/host rather than
            # $(STAGING_DIR_HOST).  This encodes CPU type and glibc version; update if bumped.
            staging_dir/target-arm_cortex-a7+neon-vfpv4_glibc-2.27_eabi/host
          key: ${{ runner.os }}-armv7hf-5.4-rustc-dev-host-v2-${{ steps.feed-lock.outputs.feed_lock_sha }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-rustc-dev-host-v2-
            ${{ runner.os }}-armv7hf-5.4-rustc-dev-host-v1-

      - name: Prepare appuser workspace
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          id appuser
          chown -R appuser:appuser "${GITHUB_WORKSPACE}"
          install -d -o appuser -g appuser /home/appuser/.cache

      - name: Check restored precursor caches
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -euo pipefail -lc '
            cd "${GITHUB_WORKSPACE}"
            echo "Cache hit summary:"
            echo "  dl=${{ steps.restore-download-cache.outputs.cache-hit }}"
            echo "  ccache=${{ steps.restore-ccache.outputs.cache-hit }}"
            echo "  feeds=${{ steps.restore-feeds-cache.outputs.cache-hit }}"
            echo "  host_toolchain=${{ steps.restore-host-toolchain-cache.outputs.cache-hit }}"
            echo "  rustc_dev=${{ steps.restore-rustc-dev-cache.outputs.cache-hit }}"
            du -sh dl .ccache feeds build_dir/host staging_dir/host 2>/dev/null || true
            if [[ -x staging_dir/host/bin/mkhash ]]; then
              echo "mkhash restored: staging_dir/host/bin/mkhash"
            else
              echo "mkhash not restored yet; build will create it if needed"
            fi
            if find staging_dir -path "*/bin/arm-openwrt-linux-gnueabihf-gcc" -print -quit | grep -q .; then
              echo "toolchain compiler present"
            else
              echo "toolchain compiler not restored yet; build will create it if needed"
            fi
          '

      - name: Bake full armv7hf-5.4 build
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" \
            bash -euo pipefail -lc '
              cd "${GITHUB_WORKSPACE}"
              mkdir -p dl .ccache
              ccache --zero-stats || true
              ./bake_armv7hf.sh world
              ccache --show-stats || true
            '

      - name: Save download cache
        if: always() && steps.preflight.outputs.needs_build == 'true' && steps.restore-download-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dl
          key: ${{ steps.restore-download-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: always() && steps.preflight.outputs.needs_build == 'true' && steps.restore-ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ steps.restore-ccache.outputs.cache-primary-key }}

      - name: Save feed checkout cache
        if: always() && steps.preflight.outputs.needs_build == 'true' && steps.restore-feeds-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            feeds
          key: ${{ steps.restore-feeds-cache.outputs.cache-primary-key }}

      - name: Save host and toolchain cache
        if: always() && steps.preflight.outputs.needs_build == 'true' && steps.restore-host-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build_dir/host
            build_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
            staging_dir/host
            staging_dir/toolchain-arm_cortex-a7+neon-vfpv4_gcc-8.4.0_glibc-2.27_eabi
          key: ${{ steps.restore-host-toolchain-cache.outputs.cache-primary-key }}

      - name: Save rustc-dev host cache
        # Save even on build failure: rustc-dev/host-compile may have completed successfully
        # before another package failed (it runs in parallel). The stamp file in
        # staging_dir/target-.../host/stamp/ is what make checks; if it's present the 2h
        # rustc-dev rebuild is skipped on the next run. Key this by feed lock because the
        # rustc-dev package definition comes from the rustlang feed.
        if: always() && steps.preflight.outputs.needs_build == 'true' && steps.restore-rustc-dev-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            staging_dir/target-arm_cortex-a7+neon-vfpv4_glibc-2.27_eabi/host
          key: ${{ steps.restore-rustc-dev-cache.outputs.cache-primary-key }}

      - name: Verify hard-float toolchain
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -euo pipefail -lc '
            cd "${GITHUB_WORKSPACE}"
            TOOLCHAIN_BIN="$(find staging_dir -path '\''*/bin/arm-openwrt-linux-gnueabihf-gcc'\'' | head -n 1)"
            test -n "${TOOLCHAIN_BIN}"
            printf '\''int main(void) { return 0; }\n'\'' > /tmp/abi.c
            "${TOOLCHAIN_BIN}" -o /tmp/abi /tmp/abi.c
            file /tmp/abi
            readelf -A /tmp/abi | grep '\''Tag_ABI_VFP_args: VFP registers'\''
          '

      - name: Verify published package set
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -euo pipefail -lc '
            cd "${GITHUB_WORKSPACE}"
            PACKAGES_DIR="bin/targets/armv7-5.4/generic-glibc/packages"

            echo "Python-related IPKs:"
            find "${PACKAGES_DIR}" -maxdepth 1 -type f \( -name '\''python3_*.ipk'\'' -o -name '\''libpython3_*.ipk'\'' -o -name '\''python3-*.ipk'\'' \) | sort || true

            echo
            echo "Entware bootstrap IPKs:"
            find "${PACKAGES_DIR}" -maxdepth 1 -type f \( -name '\''entware-release_*.ipk'\'' -o -name '\''entware-upgrade_*.ipk'\'' \) | sort || true

            required_pkgs=(
              python3
              libpython3
              python3-cffi
              python3-charset-normalizer
              python3-dbus-fast
              python3-distro
              python3-greenlet
              python3-jinja2
              python3-markupsafe
              python3-numpy
              python3-paho-mqtt
              python3-pillow
              python3-pip
              python3-pkg-resources
              python3-pyserial
              python3-setuptools
              python3-tornado
              python3-yaml
              python3-zeroconf
              python3-wrapt
              python3-aiofiles
              python3-smart-open
              python3-streaming-form-data
              python3-apprise
              python3-can
              headscale
              netbird
              tailscale
              wireguard-go
              wireguard-ui
              python3-certifi
              python3-importlib-metadata
              python3-inotify-simple
              python3-ldap3
              python3-libnacl
              python3-msgspec
              python3-periphery
              python3-preprocess-cancellation
              python3-requests-oauthlib
              python3-typing-extensions
              entware-release
              entware-upgrade
            )

            for pkg in "${required_pkgs[@]}"; do
              pkg_ipk="$(find "${PACKAGES_DIR}" -maxdepth 1 -type f -name "${pkg}_*.ipk" -print -quit)"
              printf "%s: %s\n" "${pkg}" "${pkg_ipk:-MISSING}"
              test -n "${pkg_ipk}"
            done
          '

      - name: Stage GitHub Pages feed
        if: steps.preflight.outputs.needs_build == 'true'
        env:
          PUBLISH_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.ref_name }}/armv7hf-k5.4
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            PUBLISH_BASE_URL="${PUBLISH_BASE_URL}" \
            bash -lc '
              cd "${GITHUB_WORKSPACE}"
              ./scripts/stage-armv7hf-pages.sh pages "${PUBLISH_BASE_URL}"
            '

      - name: Write build manifests
        if: steps.preflight.outputs.needs_build == 'true'
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            GITHUB_SHA="${GITHUB_SHA}" \
            GITHUB_REF="${GITHUB_REF}" \
            bash -euo pipefail -lc '
              cd "${GITHUB_WORKSPACE}"
              python3 scripts/ci/write_build_manifest.py \
                --feed-dir pages/armv7hf-k5.4 \
                --fingerprint .ci/build-fingerprint.json \
                --decision .ci/build-decision.json
            '

      - name: Upload build artifacts
        if: steps.preflight.outputs.needs_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: armv7hf-5.4-artifacts
          path: |
            bin/**/*.ipk
            pages/**/*
            logs/**/*
            .config

      - name: Create root index page
        if: steps.preflight.outputs.needs_build == 'true' && github.event_name != 'pull_request'
        run: |
          python3 scripts/gen-index.py root pages-root/index.html

      - name: Deploy to GitHub Pages
        if: steps.preflight.outputs.needs_build == 'true' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          destination_dir: ${{ github.ref_name }}
          keep_files: true

      - name: Update root index page
        if: steps.preflight.outputs.needs_build == 'true' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-root
          keep_files: true
