name: Build armv7hf-5.4

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: armv7hf-5.4-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pdscomp/kipware-runner:latest
      options: --user 0

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure host build headers
        run: |
          missing_tools=0
          for tool in gcc g++ make; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              missing_tools=1
            fi
          done

          if [[ ! -f /usr/include/stdc-predef.h || "${missing_tools}" -eq 1 ]]; then
            apt-get update
            apt-get install -y --no-install-recommends build-essential libc6-dev linux-libc-dev
          fi

          test -f /usr/include/stdc-predef.h

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-armv7hf-5.4-dl-${{ hashFiles('feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-armv7hf-5.4-ccache-${{ hashFiles('configs/armv7hf-5.4.config', 'bake_armv7hf.sh', 'feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-ccache-

      - name: Prepare appuser workspace
        run: |
          id appuser
          chown -R appuser:appuser "${GITHUB_WORKSPACE}"
          install -d -o appuser -g appuser /home/appuser/.cache

      - name: Bake full armv7hf-5.4 build
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" \
            bash -lc '
              cd "${GITHUB_WORKSPACE}"
              mkdir -p dl .ccache
              ccache --zero-stats || true
              ./bake_armv7hf.sh world
              ccache --show-stats || true
            '

      - name: Verify hard-float toolchain
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -lc '
            cd "${GITHUB_WORKSPACE}"
            TOOLCHAIN_BIN="$(find staging_dir -path '\''*/bin/arm-openwrt-linux-gnueabihf-gcc'\'' | head -n 1)"
            test -n "${TOOLCHAIN_BIN}"
            printf '\''int main(void) { return 0; }\n'\'' > /tmp/abi.c
            "${TOOLCHAIN_BIN}" -o /tmp/abi /tmp/abi.c
            file /tmp/abi
            readelf -A /tmp/abi | grep '\''Tag_ABI_VFP_args: VFP registers'\''
          '

      - name: Verify published package set
        run: |
          sudo -H -u appuser env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" bash -lc '
            cd "${GITHUB_WORKSPACE}"
            python3_pkg="$(find bin -type f -name '\''python3_*.ipk'\'' -print -quit)"
            libpython3_pkg="$(find bin -type f -name '\''libpython3_*.ipk'\'' -print -quit)"
            entware_release_pkg="$(find bin -type f -name '\''entware-release_*.ipk'\'' -print -quit)"
            entware_upgrade_pkg="$(find bin -type f -name '\''entware-upgrade_*.ipk'\'' -print -quit)"

            printf "python3: %s\n" "${python3_pkg:-missing}"
            printf "libpython3: %s\n" "${libpython3_pkg:-missing}"
            printf "entware-release: %s\n" "${entware_release_pkg:-missing}"
            printf "entware-upgrade: %s\n" "${entware_upgrade_pkg:-missing}"

            test -n "${python3_pkg}"
            test -n "${libpython3_pkg}"
            test -n "${entware_release_pkg}"
            test -n "${entware_upgrade_pkg}"
          '

      - name: Stage GitHub Pages feed
        env:
          PUBLISH_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/armv7hf-k5.4
        run: |
          sudo -H -u appuser env \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            PUBLISH_BASE_URL="${PUBLISH_BASE_URL}" \
            bash -lc '
              cd "${GITHUB_WORKSPACE}"
              ./scripts/stage-armv7hf-pages.sh pages "${PUBLISH_BASE_URL}"
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armv7hf-5.4-artifacts
          path: |
            bin/**/*.ipk
            pages/**/*
            logs/**/*
            .config

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
