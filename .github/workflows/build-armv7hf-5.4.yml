name: Build armv7hf-5.4

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: armv7hf-5.4-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pdscomp/kipware-runner:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-armv7hf-5.4-dl-${{ hashFiles('feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-armv7hf-5.4-ccache-${{ hashFiles('configs/armv7hf-5.4.config', 'bake_armv7hf.sh', 'feeds.conf', 'feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-armv7hf-5.4-ccache-

      - name: Bake full armv7hf-5.4 build
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          mkdir -p dl .ccache
          ccache --zero-stats || true
          ./bake_armv7hf.sh world
          ccache --show-stats || true

      - name: Verify hard-float toolchain
        run: |
          TOOLCHAIN_BIN="$(find staging_dir -path '*/bin/arm-openwrt-linux-gnueabihf-gcc' | head -n 1)"
          test -n "${TOOLCHAIN_BIN}"
          printf 'int main(void) { return 0; }\n' > /tmp/abi.c
          "${TOOLCHAIN_BIN}" -o /tmp/abi /tmp/abi.c
          file /tmp/abi
          readelf -A /tmp/abi | grep 'Tag_ABI_VFP_args: VFP registers'

      - name: Verify published package set
        run: |
          PKG_DIR="bin/targets/armv7-5.4/generic-glibc/packages"
          test -d "${PKG_DIR}"
          compgen -G "${PKG_DIR}/python3_*_armv7-5.4.ipk" >/dev/null
          compgen -G "${PKG_DIR}/libpython3_*_armv7-5.4.ipk" >/dev/null
          compgen -G "${PKG_DIR}/entware-opt_*_armv7-5.4.ipk" >/dev/null

      - name: Stage GitHub Pages feed
        env:
          PUBLISH_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/armv7hf-k5.4
        run: |
          ./scripts/stage-armv7hf-pages.sh pages "${PUBLISH_BASE_URL}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: armv7hf-5.4-artifacts
          path: |
            bin/**/*.ipk
            pages/**/*
            logs/**/*
            .config

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
